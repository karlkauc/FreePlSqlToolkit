name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build --no-daemon --console=plain

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14

      - name: Build linter fat-jar
        run: ./gradlew :plsql-linter-cli:shadowJar --no-daemon --console=plain

      - name: Run linter against parser samples (SARIF)
        run: |
          set -eu
          java -jar plsql-linter-cli/build/libs/plsqllint-*-all.jar check \
            --format sarif \
            --output build/lint-report.sarif \
            --fail-on ERROR \
            plsql-parser/src/test/resources/samples/ \
          || echo "linter exited non-zero (issues found); continuing to upload SARIF"
          test -s build/lint-report.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/lint-report.sarif
          category: plsqllint

      - name: Upload linter fat-jar
        uses: actions/upload-artifact@v4
        with:
          name: plsqllint-jar
          path: plsql-linter-cli/build/libs/plsqllint-*-all.jar
          retention-days: 14
