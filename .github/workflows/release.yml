name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish JARs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & test
        run: ./gradlew build --no-daemon --console=plain

      - name: Build fat-jars
        run: |
          ./gradlew :plsql-linter-cli:shadowJar :plsql-db-sync:shadowJar \
            --no-daemon --console=plain

      - name: Stage release artifacts
        run: |
          set -eu
          mkdir -p release-staging
          cp plsql-linter-cli/build/libs/plsqllint-*-all.jar release-staging/
          cp plsql-db-sync/build/libs/plsqlsync-*-all.jar     release-staging/
          ls -la release-staging/

      - name: Generate checksums
        working-directory: release-staging
        run: |
          set -eu
          sha256sum *.jar > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-staging/*.jar
            release-staging/SHA256SUMS
